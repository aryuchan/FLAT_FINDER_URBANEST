<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlatFinder | Professional Urbanest</title>
    <style>
        /* ── PRODUCTION-GRADE CSS SYSTEM ── */
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800;900&display=swap');

        :root {
            --primary: #2563eb;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #0f172a;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --radius: 20px;
        }

        [data-theme="dark"] {
            --bg: #020617;
            --card: #1e293b;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --border: #334155;
            --primary: #3b82f6;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            min-height: 100vh;
            transition: 0.3s;
        }

        nav {
            height: 80px; background: var(--card); border-bottom: 2px solid var(--border);
            display: flex; align-items: center; position: sticky; top: 0; z-index: 1000;
        }
        .nav-inner { display: flex; align-items: center; justify-content: space-between; width: 100%; max-width: 1200px; padding: 0 1.5rem; margin: 0 auto; }
        .logo { font-size: 1.8rem; font-weight: 900; color: var(--primary); text-decoration: none; letter-spacing: -1px; }
        
        .container { max-width: 1200px; margin: 0 auto; padding: 3rem 1.5rem; animation: slideUp 0.4s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        /* CARDS */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 2.5rem; margin-top: 2.5rem; }
        .card {
            background: var(--card); border-radius: var(--radius); border: 1px solid var(--border);
            padding: 2rem; box-shadow: 0 10px 40px rgba(0,0,0,0.03); transition: 0.3s;
        }
        .flat-card { overflow: hidden; padding: 0; cursor: pointer; }
        .flat-card:hover { transform: translateY(-8px); border-color: var(--primary); }
        .flat-img { width: 100%; height: 230px; background: #e2e8f0; object-fit: cover; }
        .flat-body { padding: 1.8rem; }

        /* FORM */
        .auth-card { max-width: 440px; margin: 4rem auto; text-align: center; }
        .field { text-align: left; margin-bottom: 1.5rem; }
        .label { display: block; font-weight: 800; margin-bottom: 0.5rem; color: var(--text-muted); font-size: 0.9rem; }
        .input { width: 100%; padding: 1.1rem; border-radius: 16px; border: 2.5px solid var(--border); background: var(--bg); color: var(--text); font-family: inherit; font-size: 1.1rem; }
        .input:focus { outline: none; border-color: var(--primary); }

        /* BUTTONS */
        .btn {
            padding: 1rem 2rem; border-radius: 16px; font-weight: 800; cursor: pointer;
            border: none; font-size: 1.1rem; transition: 0.2s; display: inline-flex; align-items: center; justify-content: center;
        }
        .btn-primary { background: var(--primary); color: white; box-shadow: 0 10px 20px rgba(37, 99, 235, 0.2); }
        .btn-primary:hover { transform: translateY(-2px); filter: brightness(1.1); }
        .btn-secondary { background: var(--border); color: var(--text); }
        
        .hidden { display: none !important; }
        .error { background: #fee2e2; color: #991b1b; padding: 1.2rem; border-radius: 16px; margin-bottom: 2rem; font-weight: 800; border: 2px solid #ef4444; }

        #toast { position: fixed; bottom: 2rem; right: 2rem; z-index: 2000; padding: 1.2rem 2rem; background: var(--text); color: var(--bg); border-radius: 18px; font-weight: 800; box-shadow: 0 15px 40px rgba(0,0,0,0.2); transition: 0.3s; }
    </style>
</head>
<body>

    <nav>
        <div class="nav-inner">
            <a class="logo" href="#/">🏠 URBANEST</a>
            <div style="display:flex; gap:1.5rem; align-items:center;">
                <div id="nav-links" style="display:flex; gap:1.5rem;"></div>
                <button class="btn btn-secondary" style="padding:0.6rem 1.2rem; font-size:0.9rem" onclick="toggleTheme()" id="t-btn">🌙 DARK</button>
                <div id="u-area"></div>
            </div>
        </div>
    </nav>

    <main id="app"></main>
    <div id="toast" class="hidden"></div>

    <script>
        // ── PRODUCTION SPA ENGINE ──
        let state = { user: null, flats: [], bookings: [] };
        
        const API = {
            call: async (p, m = 'GET', b = null) => {
                const h = { 'Content-Type': 'application/json', 'Authorization': `Bearer ${localStorage.getItem('ff_j')}` };
                try {
                    const r = await fetch(p, { method: m, headers: h, body: b ? JSON.stringify(b) : null });
                    return await r.json();
                } catch (e) { return { success: false, message: 'Server unreachable' }; }
            }
        };

        function toggleTheme() {
            const t = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', t);
            localStorage.setItem('ff_t', t);
            document.getElementById('t-btn').innerHTML = t === 'dark' ? '☀️ LIGHT' : '🌙 DARK';
        }

        // ── VIEWS ──
        function viewLogin() {
            return `
            <div class="container">
                <div class="card auth-card">
                    <h1 style="font-size:2.5rem;margin-bottom:0.5rem;font-weight:900">Welcome Back</h1>
                    <p style="color:var(--text-muted);margin-bottom:3rem">Sign in to your premium account</p>
                    <form onsubmit="handleAuth(event, 'login')">
                        <div id="err" class="error hidden"></div>
                        <div class="field"><label class="label">EMAIL</label><input class="input" type="email" name="email" required></div>
                        <div class="field"><label class="label">PASSWORD</label><input class="input" type="password" name="password" required></div>
                        <button class="btn btn-primary" style="width:100%" type="submit">SIGN IN</button>
                    </form>
                    <p style="margin-top:2rem;font-weight:600">New here? <a href="#/signup" style="color:var(--primary);font-weight:800">Create account</a></p>
                </div>
            </div>`;
        }

        function viewSignup() {
            return `
            <div class="container">
                <div class="card auth-card">
                    <h1 style="font-size:2.5rem;margin-bottom:0.5rem;font-weight:900">Join Us</h1>
                    <p style="color:var(--text-muted);margin-bottom:3rem">Create your property profile</p>
                    <form onsubmit="handleAuth(event, 'signup')">
                        <div id="err" class="error hidden"></div>
                        <div class="field"><label class="label">FULL NAME</label><input class="input" name="name" required></div>
                        <div class="field"><label class="label">ROLE</label><select class="input" name="role"><option value="tenant">Tenant</option><option value="owner">Owner</option></select></div>
                        <div class="field"><label class="label">EMAIL</label><input class="input" type="email" name="email" required></div>
                        <div class="field"><label class="label">PASSWORD</label><input class="input" type="password" name="password" required></div>
                        <button class="btn btn-primary" style="width:100%" type="submit">CREATE ACCOUNT</button>
                    </form>
                    <p style="margin-top:2rem;font-weight:600">Already a member? <a href="#/login" style="color:var(--primary);font-weight:800">Sign in</a></p>
                </div>
            </div>`;
        }

        async function viewDashboard() {
            if (!state.user) return viewLogin();
            const res = await API.call('/api/bookings');
            const bookings = res.success ? res.data : [];
            return `
            <div class="container">
                <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:3rem">
                    <h1 style="font-size:2.8rem;font-weight:900;letter-spacing:-1px">Hello, ${state.user.name}</h1>
                    ${state.user.role === 'tenant' ? `<button class="btn btn-primary" onclick="location.hash='#/search'">🔍 Find a Flat</button>` : ''}
                </div>
                <h2 style="font-size:1.6rem;margin-bottom:2rem;font-weight:800">Your Activity</h2>
                <div class="grid">
                    ${bookings.length ? bookings.map(b => `
                        <div class="card">
                            <h3 style="font-size:1.4rem;font-weight:800;margin-bottom:0.5rem">${b.flat_title || 'Property'}</h3>
                            <p style="color:var(--text-muted);font-weight:700">${b.status.toUpperCase()}</p>
                        </div>
                    `).join('') : '<p style="font-weight:700;color:var(--text-muted)">No bookings yet.</p>'}
                </div>
            </div>`;
        }

        async function viewSearch() {
            const res = await API.call('/api/flats');
            const flats = res.success ? res.data : [];
            return `
            <div class="container">
                <h1 style="font-size:2.8rem;font-weight:900;margin-bottom:4rem;letter-spacing:-1px">Available Properties</h1>
                <div class="grid">
                    ${flats.map(f => `
                        <div class="card flat-card">
                            <div class="flat-img"></div>
                            <div class="flat-body">
                                <h3 style="font-size:1.4rem;font-weight:800;margin-bottom:0.5rem">${f.title}</h3>
                                <p style="color:var(--text-muted);font-weight:700;margin-bottom:2rem">${f.city} — ${f.type}</p>
                                <div style="display:flex;justify-content:space-between;align-items:center">
                                    <span style="font-size:1.6rem;font-weight:900;color:var(--primary)">₹${f.rent}</span>
                                    <button class="btn btn-primary" style="padding:0.6rem 1.2rem;font-size:0.9rem" onclick="bookFlat('${f.id}')">Book</button>
                                </div>
                            </div>
                        </div>
                    `).join('')}
                </div>
            </div>`;
        }

        // ── HANDLERS ──
        async function handleAuth(e, mode) {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            const err = document.getElementById('err');
            const data = Object.fromEntries(new FormData(e.target));
            btn.disabled = true; btn.innerHTML = "Working...";
            const res = await API.call('/api/' + mode, 'POST', data);
            if (res.success) {
                localStorage.setItem('ff_j', res.data.token);
                state.user = res.data.user;
                location.hash = '#/dashboard';
            } else {
                err.innerHTML = res.message; err.classList.remove('hidden');
                btn.disabled = false; btn.innerHTML = mode === 'login' ? "SIGN IN" : "CREATE ACCOUNT";
            }
        }

        async function bookFlat(id) {
            const res = await API.call('/api/bookings', 'POST', { flat_id: id, check_in: '2026-05-01', check_out: '2026-05-08' });
            showToast(res.message);
            if (res.success) location.hash = '#/dashboard';
        }

        function updateNav() {
            const area = document.getElementById('u-area');
            const links = document.getElementById('nav-links');
            if (state.user) {
                links.innerHTML = `<a href="#/dashboard" style="color:var(--text);text-decoration:none;font-weight:800">Dashboard</a>
                                  ${state.user.role === 'tenant' ? `<a href="#/search" style="color:var(--text);text-decoration:none;font-weight:800">Search</a>` : ''}`;
                area.innerHTML = `<span style="font-weight:800">${state.user.name.split(' ')[0]}</span> 
                                  <a onclick="logout()" style="margin-left:1.5rem;cursor:pointer;color:var(--primary);font-weight:900">Logout</a>`;
            } else {
                links.innerHTML = ''; area.innerHTML = '';
            }
        }

        function logout() { localStorage.removeItem('ff_j'); state.user = null; updateNav(); location.hash = '#/login'; }

        function showToast(m) {
            const t = document.getElementById('toast');
            t.innerHTML = m; t.classList.remove('hidden');
            setTimeout(() => t.classList.add('hidden'), 4000);
        }

        async function navigate() {
            const h = window.location.hash || '#/login';
            const app = document.getElementById('app');
            if (h === '#/signup') app.innerHTML = viewSignup();
            else if (h === '#/login') app.innerHTML = viewLogin();
            else if (h === '#/search') app.innerHTML = await viewSearch();
            else if (h === '#/dashboard') app.innerHTML = await viewDashboard();
            else app.innerHTML = await viewDashboard();
            updateNav();
        }

        window.onhashchange = navigate;
        window.onload = async () => {
            if (localStorage.getItem('ff_t') === 'dark') toggleTheme();
            const res = await API.call('/api/me');
            if (res.success) state.user = res.data;
            navigate();
        };
    </script>
</body>
</html>
