<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Urbanest | Premium Property Search</title>
    <meta name="description" content="Urbanest — Premium property rental platform for tenants and owners.">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏢</text></svg>">
    <link rel="manifest" href="/manifest.json">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="flex-between" style="padding: 1.5rem 3rem; background: var(--nav-bg); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border-bottom: 2px solid var(--border); position: sticky; top: 0; z-index: 100;">
        <a href="/" class="logo" style="font-size: 2rem; font-weight: 900; color: var(--primary); text-decoration: none">URBANEST.</a>
        <div style="display: flex; gap: 1rem; flex-wrap: wrap; align-items: center; justify-content: center; margin-top: 1rem;">
            <button class="btn btn--secondary btn--sm" id="btn-theme-landing" title="Toggle Dark Mode" style="border-radius: 50%; padding: 0.5rem; width: 35px; height: 35px; display: flex; justify-content: center; align-items: center;">🌙</button>
            <a href="/tenant" class="btn btn--secondary btn--sm">Tenant Portal</a>
            <a href="/owner" class="btn btn--secondary btn--sm">Owner Portal</a>
            <a href="/admin" class="btn btn--secondary btn--sm">Admin Terminal</a>
            <a href="/tenant#/login" class="btn btn--primary btn--sm">Join Now</a>
        </div>
    </nav>
    <main class="container mt-lg" style="text-align: center; max-width: 850px; margin: 6rem auto">
        <h1 style="font-size: 4rem; font-weight: 900; margin-bottom: 1.5rem; letter-spacing: -2px">Luxury Living, Simplified.</h1>
        <p class="text-muted" style="font-size: 1.4rem; margin-bottom: 3.5rem">The premier ecosystem for professional tenants and luxury property owners.</p>
        <div class="flex-between" style="justify-content: center; gap: 1.5rem">
            <a href="/tenant#/search" class="btn btn--primary" style="padding: 1.2rem 2.5rem">Browse Inventory</a>
            <a href="/owner#/add-flat" class="btn btn--secondary" style="padding: 1.2rem 2.5rem">List Your Home</a>
        </div>
    </main>

    <!-- Fixes: Bug #10 — Standardized Toast Container -->
    <div id="app-toast"></div>

    <script src="landing.js"></script>
</body>
</html>
