<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlatFinder | System Unlocked v9.0</title>
    <style>
        /* ── SYSTEM UNLOCKED V9.0 CSS ── */
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@600;800;900&display=swap');

        :root {
            --primary: #2563eb;
            --emergency: #dc2626;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #0f172a;
            --border: #e2e8f0;
        }

        [data-theme="dark"] {
            --bg: #020617;
            --card: #1e293b;
            --text: #f8fafc;
            --border: #334155;
            --primary: #3b82f6;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        /* EMERGENCY STATUS BANNER */
        .status-banner {
            background: var(--emergency);
            color: white;
            text-align: center;
            padding: 10px;
            font-weight: 900;
            font-size: 1.1rem;
            letter-spacing: 1px;
            box-shadow: 0 4px 15px rgba(220, 38, 38, 0.4);
        }

        nav {
            height: 80px; background: var(--card); border-bottom: 3px solid var(--primary);
            display: flex; align-items: center; justify-content: center;
            position: sticky; top: 0; z-index: 1000;
        }
        .nav-inner { display: flex; align-items: center; justify-content: space-between; width: 100%; max-width: 1100px; padding: 0 1.5rem; }
        .logo { font-size: 1.8rem; font-weight: 900; color: var(--primary); text-decoration: none; }
        
        .theme-btn {
            padding: 8px 16px; border-radius: 12px; border: 2px solid var(--border);
            background: var(--card); color: var(--text); cursor: pointer; font-weight: 800;
        }

        .main { display: flex; align-items: center; justify-content: center; padding: 4rem 1rem; }
        
        .card {
            width: 100%; max-width: 440px; padding: 3.5rem; background: var(--card);
            border-radius: 35px; border: 2px solid var(--border); box-shadow: 0 30px 60px rgba(0,0,0,0.1);
            text-align: center;
        }

        .h1 { font-size: 2.4rem; font-weight: 900; margin-bottom: 1rem; }
        
        .field { text-align: left; margin-bottom: 1.5rem; }
        .label { display: block; font-weight: 800; margin-bottom: 0.5rem; color: var(--text); }
        .input {
            width: 100%; padding: 1.1rem; border-radius: 18px;
            border: 2px solid var(--border); background: var(--bg); color: var(--text);
            font-family: inherit; font-size: 1.1rem;
        }
        .input:focus { outline: none; border-color: var(--primary); }

        .btn {
            width: 100%; padding: 1.1rem; border-radius: 18px; font-weight: 900;
            cursor: pointer; border: none; font-size: 1.2rem; background: var(--primary); color: white;
            transition: 0.2s;
        }
        .btn:hover { transform: translateY(-3px); filter: brightness(1.1); }

        .switch { margin-top: 2rem; font-weight: 700; color: #64748b; }
        .switch span { color: var(--primary); cursor: pointer; text-decoration: underline; }

        .error { background: #fee2e2; color: #991b1b; padding: 1.2rem; border-radius: 18px; margin-bottom: 2rem; font-weight: 800; border: 2px solid #ef4444; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="status-banner">SYSTEM UPDATED - V9.0 (UNLOCKED)</div>

    <nav>
        <div class="nav-inner">
            <a class="logo" href="/">🏠 URBANEST</a>
            <div style="display:flex; gap:1rem; align-items:center;">
                <button class="theme-btn" onclick="toggleTheme()" id="t-btn">🌙 DARK</button>
                <div id="u-nav"></div>
            </div>
        </div>
    </nav>

    <div class="main" id="m">
        <div class="card">
            <h1 class="h1" id="title">WELCOME</h1>
            <p style="margin-bottom:2.5rem;color:#64748b;font-weight:700">Premium Housing Solution</p>
            
            <form id="auth-f">
                <div id="err" class="error hidden"></div>
                
                <div id="s-fields" class="hidden">
                    <div class="field">
                        <label class="label">NAME</label>
                        <input class="input" name="name" id="n-field">
                    </div>
                    <div class="field">
                        <label class="label">ROLE</label>
                        <select class="input" name="role">
                            <option value="tenant">TENANT</option>
                            <option value="owner">LANDLORD</option>
                        </select>
                    </div>
                </div>

                <div class="field">
                    <label class="label">EMAIL</label>
                    <input class="input" type="email" name="email" required>
                </div>
                
                <div class="field">
                    <label class="label">PASSWORD</label>
                    <input class="input" type="password" name="password" required>
                </div>
                
                <button class="btn" type="submit" id="submit-b">SIGN IN</button>
            </form>
            
            <p class="switch" id="sw-p">
                New here? <span onclick="go('signup')">Create account</span>
            </p>
        </div>
    </div>

    <script>
        let mode = 'login';

        function toggleTheme() {
            const t = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', t);
            localStorage.setItem('ff_t', t);
            document.getElementById('t-btn').innerHTML = t === 'dark' ? '☀️ LIGHT' : '🌙 DARK';
        }

        if (localStorage.getItem('ff_t') === 'dark') {
            document.documentElement.setAttribute('data-theme', 'dark');
            document.getElementById('t-btn').innerHTML = '☀️ LIGHT';
        }

        function go(m) {
            mode = m;
            document.getElementById('title').innerHTML = m === 'signup' ? 'JOIN US' : 'WELCOME';
            document.getElementById('s-fields').className = m === 'signup' ? '' : 'hidden';
            document.getElementById('submit-b').innerHTML = m === 'signup' ? 'CREATE ACCOUNT' : 'SIGN IN';
            document.getElementById('sw-p').innerHTML = m === 'signup' ? 
                'Already a member? <span onclick="go(\'login\')">Sign in</span>' : 
                'New here? <span onclick="go(\'signup\')">Create account</span>';
            document.getElementById('n-field').required = (m === 'signup');
        }

        document.getElementById('auth-f').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submit-b');
            const err = document.getElementById('err');
            const data = Object.fromEntries(new FormData(e.target));

            btn.disabled = true; btn.innerHTML = "PROCESSING...";
            err.className = 'error hidden';

            try {
                const r = await fetch('/api/' + mode, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                const res = await r.json();
                
                if (res.success) {
                    localStorage.setItem('ff_j', res.data.token);
                    document.getElementById('m').innerHTML = `<div style="text-align:center"><h1>WELCOME, ${res.data.user.name}!</h1><p>Logging you in...</p><button class="btn" onclick="location.reload()" style="width:auto;margin-top:2rem">Refresh Dashboard</button></div>`;
                } else {
                    err.innerHTML = res.message;
                    err.className = 'error';
                    btn.disabled = false; btn.innerHTML = mode === 'signup' ? "CREATE ACCOUNT" : "SIGN IN";
                }
            } catch (e) {
                err.innerHTML = "Connection failed.";
                err.className = 'error';
                btn.disabled = false; btn.innerHTML = "TRY AGAIN";
            }
        };
    </script>
</body>
</html>
