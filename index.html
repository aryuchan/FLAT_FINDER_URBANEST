<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlatFinder | Premium Urbanest</title>
    <style>
        /* ── GRAND FINALE CSS ── */
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800;900&display=swap');

        :root {
            --primary: #2563eb;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #0f172a;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --radius: 24px;
        }

        [data-theme="dark"] {
            --bg: #020617;
            --card: #1e293b;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --border: #334155;
            --primary: #3b82f6;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            min-height: 100vh;
            transition: 0.3s;
        }

        nav {
            height: 80px; background: var(--card); border-bottom: 3px solid var(--primary);
            display: flex; align-items: center; position: sticky; top: 0; z-index: 1000;
        }
        .nav-inner { display: flex; align-items: center; justify-content: space-between; width: 100%; max-width: 1200px; padding: 0 1.5rem; margin: 0 auto; }
        .logo { font-size: 1.8rem; font-weight: 900; color: var(--primary); text-decoration: none; }
        
        .theme-btn {
            padding: 8px 16px; border-radius: 12px; border: 2px solid var(--border);
            background: var(--card); color: var(--text); cursor: pointer; font-weight: 800;
        }

        .container { max-width: 1200px; margin: 0 auto; padding: 2rem 1.5rem; }
        
        /* CARDS & GRID */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 2rem; margin-top: 2rem; }
        .card {
            background: var(--card); border-radius: var(--radius); border: 1px solid var(--border);
            padding: 2rem; box-shadow: 0 10px 30px rgba(0,0,0,0.05); transition: 0.3s;
        }
        .flat-card { overflow: hidden; padding: 0; cursor: pointer; }
        .flat-card:hover { transform: translateY(-8px); box-shadow: 0 20px 40px rgba(0,0,0,0.1); }
        .flat-img { width: 100%; height: 200px; background: #cbd5e1; object-fit: cover; }
        .flat-body { padding: 1.5rem; }

        /* BUTTONS */
        .btn {
            padding: 1rem 2rem; border-radius: 16px; font-weight: 800; cursor: pointer;
            border: none; font-size: 1.1rem; transition: 0.2s; display: inline-flex; align-items: center; justify-content: center;
        }
        .btn-primary { background: var(--primary); color: white; }
        .btn-secondary { background: var(--border); color: var(--text); }

        /* AUTH */
        .auth-card { max-width: 440px; margin: 5rem auto; text-align: center; }
        .field { text-align: left; margin-bottom: 1.5rem; }
        .label { display: block; font-weight: 800; margin-bottom: 0.5rem; }
        .input { width: 100%; padding: 1.1rem; border-radius: 16px; border: 2px solid var(--border); background: var(--bg); color: var(--text); font-family: inherit; }

        .hidden { display: none !important; }
        .error { background: #fee2e2; color: #991b1b; padding: 1.2rem; border-radius: 16px; margin-bottom: 2rem; font-weight: 800; border: 2px solid #ef4444; }

        /* BADGES */
        .badge { padding: 0.4rem 1rem; border-radius: 100px; font-size: 0.8rem; font-weight: 800; }
        .badge-blue { background: #dbeafe; color: #1e40af; }
    </style>
</head>
<body>

    <nav>
        <div class="nav-inner">
            <a class="logo" href="#/">🏠 URBANEST</a>
            <div style="display:flex; gap:1rem; align-items:center;">
                <div id="nav-links" style="display:flex; gap:1rem;"></div>
                <button class="theme-btn" onclick="toggleTheme()" id="t-btn">🌙 DARK</button>
                <div id="u-area"></div>
            </div>
        </div>
    </nav>

    <main id="app"></main>

    <script>
        // ── CORE STATE & ENGINE ──
        let state = { user: null, flats: [], bookings: [] };
        
        const API = {
            get: async (p) => {
                const r = await fetch(p, { headers: { 'Authorization': `Bearer ${localStorage.getItem('ff_j')}` } });
                return r.json();
            },
            post: async (p, b) => {
                const r = await fetch(p, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${localStorage.getItem('ff_j')}` },
                    body: JSON.stringify(b)
                });
                return r.json();
            }
        };

        function toggleTheme() {
            const t = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', t);
            localStorage.setItem('ff_t', t);
            document.getElementById('t-btn').innerHTML = t === 'dark' ? '☀️ LIGHT' : '🌙 DARK';
        }

        // ── VIEWS ──
        function viewLogin() {
            return `
            <div class="container">
                <div class="card auth-card">
                    <h1 style="font-size:2.5rem;margin-bottom:1rem">Welcome</h1>
                    <p style="color:var(--text-muted);margin-bottom:3rem">Sign in to your premium account</p>
                    <form onsubmit="handleAuth(event, 'login')">
                        <div id="err" class="error hidden"></div>
                        <div class="field"><label class="label">Email</label><input class="input" type="email" name="email" required></div>
                        <div class="field"><label class="label">Password</label><input class="input" type="password" name="password" required></div>
                        <button class="btn btn-primary" style="width:100%" type="submit">SIGN IN</button>
                    </form>
                    <p style="margin-top:2rem">New here? <a href="#/signup" style="color:var(--primary);font-weight:800">Create account</a></p>
                </div>
            </div>`;
        }

        function viewSignup() {
            return `
            <div class="container">
                <div class="card auth-card">
                    <h1 style="font-size:2.5rem;margin-bottom:1rem">Join Us</h1>
                    <p style="color:var(--text-muted);margin-bottom:3rem">Create your property profile</p>
                    <form onsubmit="handleAuth(event, 'signup')">
                        <div id="err" class="error hidden"></div>
                        <div class="field"><label class="label">Full Name</label><input class="input" name="name" required></div>
                        <div class="field">
                            <label class="label">Role</label>
                            <select class="input" name="role"><option value="tenant">Tenant</option><option value="owner">Owner</option></select>
                        </div>
                        <div class="field"><label class="label">Email</label><input class="input" type="email" name="email" required></div>
                        <div class="field"><label class="label">Password</label><input class="input" type="password" name="password" required></div>
                        <button class="btn btn-primary" style="width:100%" type="submit">CREATE ACCOUNT</button>
                    </form>
                    <p style="margin-top:2rem">Already a member? <a href="#/login" style="color:var(--primary);font-weight:800">Sign in</a></p>
                </div>
            </div>`;
        }

        async function viewDashboard() {
            if (!state.user) return viewLogin();
            const res = await API.get('/api/bookings');
            const bookings = res.success ? res.data : [];
            
            return `
            <div class="container">
                <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:3rem">
                    <h1 style="font-size:2.5rem;font-weight:900">Hello, ${state.user.name}</h1>
                    ${state.user.role === 'tenant' ? `<button class="btn btn-primary" onclick="location.hash='#/search'">🔍 Search Flats</button>` : ''}
                </div>
                
                <h2 style="font-size:1.8rem;margin-bottom:1.5rem">My Recent Bookings</h2>
                <div class="grid">
                    ${bookings.length ? bookings.map(b => `
                        <div class="card">
                            <h3 style="margin-bottom:0.5rem">${b.flat_title}</h3>
                            <p style="color:var(--text-muted);margin-bottom:1rem">${b.city} — ${b.type}</p>
                            <span class="badge badge-blue">${b.status.toUpperCase()}</span>
                        </div>
                    `).join('') : '<p>No bookings found yet.</p>'}
                </div>
            </div>`;
        }

        async function viewSearch() {
            const res = await API.get('/api/flats');
            const flats = res.success ? res.data : [];
            return `
            <div class="container">
                <h1 style="font-size:2.5rem;font-weight:900;margin-bottom:2rem">Available Properties</h1>
                <div class="grid">
                    ${flats.map(f => `
                        <div class="card flat-card">
                            <img src="${f.images?.[0] || 'https://via.placeholder.com/400x250'}" class="flat-img">
                            <div class="flat-body">
                                <h3 style="margin-bottom:0.5rem">${f.title}</h3>
                                <p style="color:var(--text-muted);margin-bottom:1rem">${f.city} — ${f.type}</p>
                                <div style="display:flex;justify-content:space-between;align-items:center">
                                    <span style="font-size:1.3rem;font-weight:900;color:var(--primary)">₹${f.rent}</span>
                                    <button class="btn btn-secondary" style="padding:0.5rem 1rem;font-size:0.9rem" onclick="bookFlat('${f.id}')">Book Now</button>
                                </div>
                            </div>
                        </div>
                    `).join('')}
                </div>
            </div>`;
        }

        // ── HANDLERS ──
        async function handleAuth(e, mode) {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            const err = document.getElementById('err');
            const data = Object.fromEntries(new FormData(e.target));
            
            btn.disabled = true; btn.innerHTML = "Working...";
            err.classList.add('hidden');

            const res = await API.post('/api/' + mode, data);
            if (res.success) {
                localStorage.setItem('ff_j', res.data.token);
                state.user = res.data.user;
                location.hash = '#/dashboard';
                updateNav();
            } else {
                err.innerHTML = res.message; err.classList.remove('hidden');
                btn.disabled = false; btn.innerHTML = mode === 'login' ? "SIGN IN" : "CREATE ACCOUNT";
            }
        }

        async function bookFlat(id) {
            const checkIn = new Date().toISOString().split('T')[0];
            const checkOut = new Date(Date.now() + 86400000 * 7).toISOString().split('T')[0];
            const res = await API.post('/api/bookings', { flat_id: id, check_in: checkIn, check_out: checkOut });
            alert(res.message);
            if (res.success) location.hash = '#/dashboard';
        }

        function updateNav() {
            const area = document.getElementById('u-area');
            const links = document.getElementById('nav-links');
            if (state.user) {
                links.innerHTML = `<a href="#/dashboard" style="color:var(--text);text-decoration:none;font-weight:700">Dashboard</a>
                                  ${state.user.role === 'tenant' ? `<a href="#/search" style="color:var(--text);text-decoration:none;font-weight:700">Search</a>` : ''}`;
                area.innerHTML = `<b>${state.user.name}</b> <a onclick="logout()" style="margin-left:1rem;cursor:pointer;color:var(--primary)">Logout</a>`;
            } else {
                links.innerHTML = ''; area.innerHTML = '';
            }
        }

        function logout() { localStorage.removeItem('ff_j'); state.user = null; updateNav(); location.hash = '#/login'; }

        // ── ROUTER ──
        async function navigate() {
            const h = window.location.hash || '#/login';
            const app = document.getElementById('app');
            
            if (h === '#/signup') app.innerHTML = viewSignup();
            else if (h === '#/login') app.innerHTML = viewLogin();
            else if (h === '#/search') app.innerHTML = await viewSearch();
            else if (h === '#/dashboard') app.innerHTML = await viewDashboard();
            else app.innerHTML = await viewDashboard();
            
            updateNav();
        }

        window.onhashchange = navigate;
        window.onload = async () => {
            if (localStorage.getItem('ff_t') === 'dark') toggleTheme();
            const res = await API.get('/api/me');
            if (res.success) state.user = res.data;
            navigate();
        };
    </script>
</body>
</html>
