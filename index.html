<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlatFinder | Premium Urban Living</title>
    
    <!-- ── CACHE KILLER & THEME INITIALIZER ── -->
    <script>
        // 1. Kill all old Service Workers immediately
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(regs => {
                for(let reg of regs) reg.unregister();
            });
        }
        // 2. Initialize Theme before CSS to prevent flicker
        const savedTheme = localStorage.getItem('ff_theme') || 
            (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        document.documentElement.setAttribute('data-theme', savedTheme);
    </script>

    <meta name="api-base" content="{{API_BASE}}">
    
    <!-- Added ?v=4.0 to force browser to load fresh CSS -->
    <link rel="stylesheet" href="style.css?v=4.0">
</head>
<body>

    <!-- ── NAVIGATION ── -->
    <nav id="app-nav"></nav>

    <!-- ── MAIN CONTENT ── -->
    <main id="app-root" role="main" aria-live="polite"></main>

    <!-- ── TOAST NOTIFICATIONS ── -->
    <div id="app-toast"></div>

    <!-- ── AUTH TEMPLATE (Login & Signup) ── -->
    <template id="tmpl-auth">
        <div class="auth-wrapper">
            <div class="auth-card glass">
                <div class="auth-logo">🏠</div>
                <h1 class="auth-title">FlatFinder</h1>
                <p class="auth-sub">{{SUBTITLE}}</p>
                
                <form id="auth-form" class="auth-form" data-mode="{{MODE}}">
                    <div id="auth-error" class="form-error hidden"></div>
                    
                    {{SIGNUP_FIELDS}}
                    
                    <div class="form-group">
                        <label class="form-label" for="auth-email">Email Address</label>
                        <input class="form-input" type="email" id="auth-email" name="email" 
                               placeholder="name@example.com" required>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label" for="auth-password">Password</label>
                        <div class="input-wrap">
                            <input class="form-input" type="password" id="auth-password" name="password" 
                                   placeholder="Your password" required>
                            <button type="button" class="input-eye" id="toggle-password" tabindex="-1">👁</button>
                        </div>
                    </div>
                    
                    <button class="btn btn-primary btn--full" type="submit" id="auth-submit">
                        {{SUBMIT_LABEL}}
                    </button>
                </form>
                
                <p class="auth-switch">
                    {{SWITCH_TEXT}} <a data-route="{{SWITCH_LINK}}" style="cursor:pointer; font-weight:700;">{{SWITCH_ACTION}}</a>
                </p>
            </div>
        </div>
    </template>

    <!-- ── SIGNUP EXTRA FIELDS SNIPPET ── -->
    <template id="tmpl-signup-fields">
        <div class="form-group">
            <label class="form-label" for="auth-name">Full Name</label>
            <input class="form-input" type="text" id="auth-name" name="name" placeholder="John Doe" required>
        </div>
        <div class="form-group">
            <label class="form-label">I am a...</label>
            <div class="role-pills">
                <label class="role-pill">
                    <input type="radio" name="role" value="tenant" checked> 🔑 Tenant
                </label>
                <label class="role-pill">
                    <input type="radio" name="role" value="owner"> 🏘 Landlord
                </label>
            </div>
        </div>
    </template>

    <!-- ── DASHBOARD TEMPLATES ── -->
    <template id="tmpl-tenant-dash">
        <div class="container page-content">
            <div class="page-header">
                <h1>Welcome Home, {{NAME}}</h1>
                <button class="btn btn-primary" data-route="/tenant/search">🔍 Find a Flat</button>
            </div>
            <div id="booking-stats" class="stat-grid mt-lg"></div>
            <h2 class="mt-xl">My Recent Bookings</h2>
            <div id="booking-list" class="dashboard-grid"></div>
        </div>
    </template>

    <template id="tmpl-owner-dash">
        <div class="container page-content">
            <div class="page-header">
                <h1>Property Manager</h1>
                <button class="btn btn-primary" data-route="/owner/add-flat">➕ List New Property</button>
            </div>
            <div id="owner-stats" class="stat-grid mt-lg"></div>
            <h2 class="mt-xl">My Properties</h2>
            <div id="property-list" class="dashboard-grid"></div>
        </div>
    </template>

    <!-- Added ?v=4.0 to force browser to load fresh JS -->
    <script src="ff-core.js?v=4.0"></script>
    <script src="ff-auth.js?v=4.0"></script>
    <script src="ff-tenant.js?v=4.0"></script>
    <script src="ff-owner.js?v=4.0"></script>
    <script src="ff-admin.js?v=4.0"></script>
    <script src="app.js?v=4.0"></script>

</body>
</html>
