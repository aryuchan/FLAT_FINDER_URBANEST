<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlatFinder | Premium Urbanest</title>
    <style>
        /* ── DIAMOND POLISH CSS ── */
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800;900&display=swap');

        :root {
            --primary: #2563eb;
            --primary-glow: rgba(37, 99, 235, 0.1);
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #0f172a;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --radius: 24px;
        }

        [data-theme="dark"] {
            --bg: #020617;
            --card: #1e293b;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --border: #334155;
            --primary: #3b82f6;
            --primary-glow: rgba(96, 165, 250, 0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            min-height: 100vh;
            transition: background 0.3s, color 0.3s;
            overflow-x: hidden;
        }

        /* ── NAVIGATION ── */
        nav {
            height: 80px; background: var(--card); border-bottom: 1px solid var(--border);
            display: flex; align-items: center; position: sticky; top: 0; z-index: 1000;
            backdrop-filter: blur(10px);
        }
        .nav-inner { display: flex; align-items: center; justify-content: space-between; width: 100%; max-width: 1200px; padding: 0 1.5rem; margin: 0 auto; }
        .logo { font-size: 1.8rem; font-weight: 900; color: var(--primary); text-decoration: none; display: flex; align-items: center; gap: 0.5rem; }
        
        .theme-btn {
            padding: 10px 18px; border-radius: 12px; border: 1.5px solid var(--border);
            background: var(--card); color: var(--text); cursor: pointer; font-weight: 800; transition: 0.2s;
        }
        .theme-btn:hover { background: var(--border); }

        .container { max-width: 1200px; margin: 0 auto; padding: 3rem 1.5rem; animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        /* ── GRID & CARDS ── */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 2.5rem; margin-top: 2rem; }
        .card {
            background: var(--card); border-radius: var(--radius); border: 1px solid var(--border);
            padding: 2.5rem; box-shadow: 0 10px 40px rgba(0,0,0,0.03); transition: 0.3s;
        }
        .flat-card { overflow: hidden; padding: 0; cursor: pointer; border-width: 2px; }
        .flat-card:hover { transform: translateY(-10px); box-shadow: 0 20px 50px rgba(0,0,0,0.08); border-color: var(--primary); }
        .flat-img { width: 100%; height: 220px; background: #e2e8f0; object-fit: cover; }
        .flat-body { padding: 1.8rem; }

        /* ── BUTTONS ── */
        .btn {
            padding: 1.1rem 2.2rem; border-radius: 18px; font-weight: 800; cursor: pointer;
            border: none; font-size: 1.1rem; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: inline-flex; align-items: center; justify-content: center;
        }
        .btn-primary { background: var(--primary); color: white; box-shadow: 0 10px 25px var(--primary-glow); }
        .btn-primary:hover { transform: translateY(-3px); filter: brightness(1.1); box-shadow: 0 15px 35px var(--primary-glow); }
        .btn-secondary { background: var(--border); color: var(--text); }

        /* ── AUTH ── */
        .auth-card { max-width: 460px; margin: 4rem auto; text-align: center; border-width: 2px; }
        .field { text-align: left; margin-bottom: 1.5rem; }
        .label { display: block; font-weight: 800; margin-bottom: 0.6rem; color: var(--text-muted); font-size: 0.9rem; }
        .input { width: 100%; padding: 1.2rem; border-radius: 18px; border: 2.5px solid var(--border); background: var(--bg); color: var(--text); font-family: inherit; font-size: 1.05rem; transition: 0.3s; }
        .input:focus { outline: none; border-color: var(--primary); }

        .hidden { display: none !important; }
        .error { background: #fee2e2; color: #991b1b; padding: 1.2rem; border-radius: 18px; margin-bottom: 2rem; font-weight: 800; border: 2px solid #ef4444; }

        /* ── BADGES ── */
        .badge { padding: 0.5rem 1.2rem; border-radius: 100px; font-size: 0.85rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px; }
        .badge-blue { background: var(--primary-glow); color: var(--primary); }

        #toast-container { position: fixed; bottom: 2rem; right: 2rem; z-index: 9999; }
        .toast { padding: 1.2rem 2.2rem; background: var(--text); color: var(--bg); border-radius: 20px; font-weight: 800; margin-top: 0.75rem; box-shadow: 0 15px 40px rgba(0,0,0,0.2); animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
    </style>
</head>
<body>

    <nav>
        <div class="nav-inner">
            <a class="logo" href="#/">🏠 URBANEST</a>
            <div style="display:flex; gap:1.25rem; align-items:center;">
                <div id="nav-links" style="display:flex; gap:1.25rem;"></div>
                <button class="theme-btn" onclick="toggleTheme()" id="t-btn">🌙 DARK</button>
                <div id="u-area"></div>
            </div>
        </div>
    </nav>

    <main id="app"></main>
    <div id="toast-container"></div>

    <script>
        // ── DIAMOND ENGINE ──
        let state = { user: null, flats: [], bookings: [] };
        
        const API = {
            get: async (p) => {
                try {
                    const r = await fetch(p, { headers: { 'Authorization': `Bearer ${localStorage.getItem('ff_j')}` } });
                    return await r.json();
                } catch (e) { return { success: false, message: 'Server unreachable' }; }
            },
            post: async (p, b) => {
                try {
                    const r = await fetch(p, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${localStorage.getItem('ff_j')}` },
                        body: JSON.stringify(b)
                    });
                    return await r.json();
                } catch (e) { return { success: false, message: 'Server unreachable' }; }
            }
        };

        function toggleTheme() {
            const t = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', t);
            localStorage.setItem('ff_t', t);
            document.getElementById('t-btn').innerHTML = t === 'dark' ? '☀️ LIGHT' : '🌙 DARK';
        }

        // ── VIEWS ──
        function viewLogin() {
            return `
            <div class="container">
                <div class="card auth-card">
                    <h1 style="font-size:2.8rem;margin-bottom:0.5rem;font-weight:900">Welcome Back</h1>
                    <p style="color:var(--text-muted);margin-bottom:3rem;font-size:1.1rem">Sign in to your premium account</p>
                    <form onsubmit="handleAuth(event, 'login')">
                        <div id="err" class="error hidden"></div>
                        <div class="field"><label class="label">EMAIL ADDRESS</label><input class="input" type="email" name="email" placeholder="name@example.com" required></div>
                        <div class="field"><label class="label">PASSWORD</label><input class="input" type="password" name="password" placeholder="••••••••" required></div>
                        <button class="btn btn-primary" style="width:100%" type="submit">SIGN IN</button>
                    </form>
                    <p style="margin-top:2rem;font-weight:600">New here? <a href="#/signup" style="color:var(--primary);font-weight:800">Create account</a></p>
                </div>
            </div>`;
        }

        function viewSignup() {
            return `
            <div class="container">
                <div class="card auth-card">
                    <h1 style="font-size:2.8rem;margin-bottom:0.5rem;font-weight:900">Join Us</h1>
                    <p style="color:var(--text-muted);margin-bottom:3rem;font-size:1.1rem">Create your property profile</p>
                    <form onsubmit="handleAuth(event, 'signup')">
                        <div id="err" class="error hidden"></div>
                        <div class="field"><label class="label">FULL NAME</label><input class="input" name="name" placeholder="John Doe" required></div>
                        <div class="field">
                            <label class="label">I AM A...</label>
                            <select class="input" name="role"><option value="tenant">Tenant</option><option value="owner">Landlord / Owner</option></select>
                        </div>
                        <div class="field"><label class="label">EMAIL ADDRESS</label><input class="input" type="email" name="email" required></div>
                        <div class="field"><label class="label">PASSWORD</label><input class="input" type="password" name="password" required></div>
                        <button class="btn btn-primary" style="width:100%" type="submit">CREATE ACCOUNT</button>
                    </form>
                    <p style="margin-top:2rem;font-weight:600">Already a member? <a href="#/login" style="color:var(--primary);font-weight:800">Sign in</a></p>
                </div>
            </div>`;
        }

        async function viewDashboard() {
            if (!state.user) return viewLogin();
            const res = await API.get('/api/bookings');
            const bookings = res.success ? res.data : [];
            
            return `
            <div class="container">
                <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4rem">
                    <div>
                        <h1 style="font-size:3rem;font-weight:900;letter-spacing:-1px">Hello, ${state.user.name.split(' ')[0]}!</h1>
                        <p style="color:var(--text-muted);font-weight:600;font-size:1.1rem">Welcome to your ${state.user.role} dashboard</p>
                    </div>
                    ${state.user.role === 'tenant' ? `<button class="btn btn-primary" onclick="location.hash='#/search'">🔍 Find a Flat</button>` : ''}
                </div>
                
                <h2 style="font-size:1.8rem;margin-bottom:2rem;font-weight:900">Your Activity</h2>
                <div class="grid">
                    ${bookings.length ? bookings.map(b => `
                        <div class="card" style="padding:1.8rem">
                            <div style="display:flex;justify-content:space-between;align-items:start;margin-bottom:1rem">
                                <h3 style="font-size:1.3rem;font-weight:800">${b.flat_title}</h3>
                                <span class="badge badge-blue">${b.status}</span>
                            </div>
                            <p style="color:var(--text-muted);font-weight:700;margin-bottom:1.5rem">${b.city} — ${b.type}</p>
                            <div style="border-top:1px solid var(--border);padding-top:1rem;display:flex;justify-content:space-between;font-size:0.9rem">
                                <span><b>IN:</b> ${new Date(b.check_in).toLocaleDateString()}</span>
                                <span><b>OUT:</b> ${new Date(b.check_out).toLocaleDateString()}</span>
                            </div>
                        </div>
                    `).join('') : '<div class="card" style="grid-column:1/-1;text-align:center"><p style="font-weight:700;color:var(--text-muted)">No bookings or listings found yet.</p></div>'}
                </div>
            </div>`;
        }

        async function viewSearch() {
            const res = await API.get('/api/flats');
            const flats = res.success ? res.data : [];
            return `
            <div class="container">
                <h1 style="font-size:3rem;font-weight:900;margin-bottom:1rem;letter-spacing:-1px">Find your next home</h1>
                <p style="color:var(--text-muted);margin-bottom:4rem;font-weight:600">Explore premium properties across the city</p>
                <div class="grid">
                    ${flats.map(f => `
                        <div class="card flat-card" onclick="location.hash='#/flat/${f.id}'">
                            <img src="${f.images?.[0] || 'https://images.unsplash.com/photo-1560448204-e02f11c3d0e2?auto=format&fit=crop&w=800&q=80'}" class="flat-img">
                            <div class="flat-body">
                                <h3 style="font-size:1.4rem;font-weight:800;margin-bottom:0.5rem">${f.title}</h3>
                                <p style="color:var(--text-muted);font-weight:700;margin-bottom:2rem">${f.city} — ${f.type}</p>
                                <div style="display:flex;justify-content:space-between;align-items:center">
                                    <span style="font-size:1.6rem;font-weight:900;color:var(--primary)">₹${f.rent}</span>
                                    <button class="btn btn-secondary" style="padding:0.7rem 1.2rem;font-size:0.9rem;font-weight:800" onclick="event.stopPropagation(); bookFlat('${f.id}')">Instant Book</button>
                                </div>
                            </div>
                        </div>
                    `).join('')}
                </div>
            </div>`;
        }

        // ── HANDLERS ──
        async function handleAuth(e, mode) {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            const err = document.getElementById('err');
            const data = Object.fromEntries(new FormData(e.target));
            
            btn.disabled = true; btn.innerHTML = "Processing...";
            err.classList.add('hidden');

            const res = await API.post('/api/' + mode, data);
            if (res.success) {
                localStorage.setItem('ff_j', res.data.token);
                state.user = res.data.user;
                showToast("Welcome to Urbanest!");
                location.hash = '#/dashboard';
            } else {
                err.innerHTML = res.message; err.classList.remove('hidden');
                btn.disabled = false; btn.innerHTML = mode === 'login' ? "SIGN IN" : "CREATE ACCOUNT";
            }
        }

        async function bookFlat(id) {
            const checkIn = new Date().toISOString().split('T')[0];
            const checkOut = new Date(Date.now() + 86400000 * 7).toISOString().split('T')[0];
            const res = await API.post('/api/bookings', { flat_id: id, check_in: checkIn, check_out: checkOut });
            showToast(res.message);
            if (res.success) location.hash = '#/dashboard';
        }

        function updateNav() {
            const area = document.getElementById('u-area');
            const links = document.getElementById('nav-links');
            if (state.user) {
                links.innerHTML = `<a href="#/dashboard" style="color:var(--text);text-decoration:none;font-weight:800;font-size:0.95rem">DASHBOARD</a>
                                  ${state.user.role === 'tenant' ? `<a href="#/search" style="color:var(--text);text-decoration:none;font-weight:800;font-size:0.95rem">SEARCH</a>` : ''}`;
                area.innerHTML = `<span style="font-weight:800;color:var(--text)">${state.user.name.split(' ')[0]}</span> 
                                  <a onclick="logout()" style="margin-left:1.5rem;cursor:pointer;color:var(--primary);font-weight:900">LOGOUT</a>`;
            } else {
                links.innerHTML = ''; area.innerHTML = '';
            }
        }

        function logout() { localStorage.removeItem('ff_j'); state.user = null; updateNav(); location.hash = '#/login'; showToast("Logged out successfully."); }

        function showToast(m) {
            const c = document.getElementById('toast-container');
            const t = document.createElement('div');
            t.className = 'toast';
            t.innerHTML = m;
            c.appendChild(t);
            setTimeout(() => { t.style.opacity = '0'; t.style.transform = 'translateX(50px)'; setTimeout(() => t.remove(), 300); }, 4000);
        }

        // ── ROUTER ──
        async function navigate() {
            const h = window.location.hash || '#/login';
            const app = document.getElementById('app');
            
            window.scrollTo(0, 0);
            
            if (h === '#/signup') app.innerHTML = viewSignup();
            else if (h === '#/login') app.innerHTML = viewLogin();
            else if (h === '#/search') app.innerHTML = await viewSearch();
            else if (h === '#/dashboard') app.innerHTML = await viewDashboard();
            else app.innerHTML = await viewDashboard();
            
            updateNav();
        }

        window.onhashchange = navigate;
        window.onload = async () => {
            if (localStorage.getItem('ff_t') === 'dark') toggleTheme();
            const res = await API.get('/api/me');
            if (res.success) state.user = res.data;
            navigate();
        };
    </script>
</body>
</html>
