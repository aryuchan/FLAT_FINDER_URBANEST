<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Urbanest | Admin Terminal</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <nav class="nav" id="app-nav"></nav>
    <main id="app-root" class="page-content"></main>
    <div id="app-toast"></div>

    <!-- Templates -->
    <template id="tmpl-auth">
        <div class="container" style="max-width:450px; padding-top:10vh">
            <div class="auth-card" style="border-top: 4px solid var(--danger); font-family: monospace">
                <h1 class="page-title">{{title}}</h1>
                <p class="text-muted mt-sm">SECURE ADMINISTRATIVE TERMINAL</p>
                <form id="auth-form" class="mt-lg">
                    <div class="field"><label class="label">ROOT EMAIL</label><input class="input" type="email" name="email" required></div>
                    <div class="field mt-sm">
                        <label class="label">PASSCODE</label>
                        <div style="position:relative">
                            <input class="input" type="password" name="password" required style="padding-right:45px">
                            <button type="button" class="toggle-password" style="position:absolute; right:10px; top:50%; transform:translateY(-50%); background:none; border:none; cursor:pointer">👁️</button>
                        </div>
                    </div>
                    <button type="submit" class="btn btn--danger btn--full mt-lg">Initialize Access</button>
                </form>
            </div>
        </div>
    </template>

    <template id="tmpl-signup">
        <div class="container" style="max-width:450px; padding-top:10vh">
            <div class="auth-card" style="text-align:center">
                <h1 class="page-title">Access Denied</h1>
                <p class="text-muted mt-sm">Admin self-registration is disabled for security.</p>
                <a href="#/login" class="btn btn--secondary mt-lg">Return to Terminal</a>
            </div>
        </div>
    </template>

    <script src="ff-core.js"></script>
    <script src="ff-auth.js"></script>
    <script src="ff-admin.js"></script>
    <script src="app.js"></script>
    <script>
        if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');
    </script>
</body>
</html>
