<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Urbanest | Admin Terminal</title>
    <link rel="stylesheet" href="style.css">
    <!-- FIX [18]: Added web app manifest link -->
    <link rel="manifest" href="/manifest.json">
    <script>document.documentElement.setAttribute('data-theme', localStorage.getItem('ff_theme') || 'light');</script>
</head>
<body>
    <nav id="app-nav"></nav><main id="app-root"></main><div id="app-toast"></div>
    <template id="tmpl-auth">
        <div class="card auth-card" style="max-width: 440px; margin: 80px auto; text-align: center">
            <!-- FIX [5]: Use template variables -->
            <h1>{{title}}</h1><p class="text-muted">{{sub}}</p>
            <form id="auth-form" class="mt-lg">
                <input class="input mt-sm" type="email" name="email" placeholder="Admin Email" required style="width:100%">
                <div style="position:relative" class="mt-sm">
                    <input class="input" type="password" name="password" placeholder="Passcode" required style="width:100%; padding-right:40px">
                    <button type="button" class="toggle-password" tabindex="-1" style="position:absolute; right:10px; top:50%; transform:translateY(-50%); background:none; border:none; cursor:pointer">👁️</button>
                </div>
                <button type="submit" class="btn btn--primary btn--full mt-lg">Initialize Terminal</button>
            </form>
            <!-- FIX [9]: Removed admin signup link -->
            <p class="mt-sm" style="font-size: 0.9rem" class="text-muted">Admin accounts are provisioned by the system administrator.</p>
        </div>
    </template>
    <script src="ff-core.js"></script><script src="ff-auth.js"></script><script src="ff-admin.js"></script><script src="app.js"></script>
    <!-- FIX [6]: Added service worker registration -->
    <script>if('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');</script>
</body>
</html>
