<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>Urbanest | Admin Terminal</title><link rel="stylesheet" href="style.css">
</head>
<body>
    <nav id="app-nav"></nav><main id="app-root"></main><div id="app-toast"></div>
    <template id="tmpl-auth">
        <div class="card auth-card" style="max-width: 440px; margin: 80px auto; text-align: center">
            <h1>Admin Control</h1><p class="text-muted">Global system oversight</p>
            <form id="auth-form" class="mt-lg">
                <input class="input mt-sm" type="email" name="email" placeholder="Admin Key" required style="width:100%">
                <input class="input mt-sm" type="password" name="password" placeholder="Passcode" required style="width:100%">
                <button type="submit" class="btn btn--primary btn--full mt-lg">Initialize Terminal</button>
            </form>
        </div>
    </template>
    <script src="ff-core.js"></script><script src="ff-auth.js"></script><script src="ff-admin.js"></script><script src="app.js"></script>
</body>
</html>
