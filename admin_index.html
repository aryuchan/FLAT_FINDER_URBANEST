<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta
      name="description"
      content="FlatFinder — Admin Portal. Platform management, user oversight, and system configuration. Secure administration interface."
    />
    <meta name="robots" content="noindex, nofollow" />
    <meta name="color-scheme" content="light dark" />
    <meta name="author" content="FlatFinder" />
    <meta name="theme-color" content="#dc2626" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="apple-mobile-web-app-title" content="FlatFinder Admin" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta property="og:title" content="FlatFinder — Admin Portal" />
    <meta property="og:site_name" content="FlatFinder" />

    <!-- Preconnect for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="dns-prefetch" href="https://api.example.com" />

    <title>FlatFinder — Admin</title>
    <link
      rel="icon"
      type="image/svg+xml"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='75' font-size='75' fill='%23dc2626'>⚙️</text></svg>"
    />
    <link
      rel="apple-touch-icon"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><text y='135' font-size='120' fill='%23dc2626'>⚙️</text></svg>"
    />
    <link rel="manifest" href="manifest.json" />
    <link rel="preload" href="style.css" as="style" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <a class="skip-link" href="#app-root">Skip to main content</a>
    <div id="app-loader" class="loader-overlay">
      <div class="loader-spinner"></div>
      <p>Initializing Admin Portal...</p>
    </div>
    <nav id="app-nav" role="navigation" aria-label="Main navigation"></nav>
    <main
      id="app-root"
      role="main"
      aria-live="polite"
      aria-atomic="false"
    ></main>
    <div
      id="app-toast"
      role="status"
      aria-live="assertive"
      aria-atomic="true"
      aria-relevant="additions text"
    ></div>
    <div
      id="app-modal"
      role="dialog"
      aria-modal="true"
      aria-label="Application dialog"
      aria-hidden="true"
    ></div>

    <noscript>
      <p class="noscript-message">
        FlatFinder requires JavaScript. Please enable it in your browser
        settings.
      </p>
    </noscript>

    <!-- Role hint for router -->
    <script>
      window.FF_ROLE_HINT = "admin";
    </script>

    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker
            .register("/sw.js")
            .then((reg) => {
              console.log("[ServiceWorker] Registered successfully");
              reg.onupdatefound = () => {
                const newWorker = reg.installing;
                newWorker.onstatechange = () => {
                  if (
                    newWorker.state === "installed" &&
                    navigator.serviceWorker.controller
                  ) {
                    console.log(
                      "[ServiceWorker] Update available, reloading...",
                    );
                    window.location.reload();
                  }
                };
              };
            })
            .catch((err) =>
              console.warn("[ServiceWorker] Registration failed:", err),
            );
        });
      }
    </script>

        <!-- HTML Templates for Admin Module -->
    <template id="admin-dashboard-template">
      <div class="container page-content">
        <div class="page-header"><h2>Admin Dashboard</h2></div>
        <div class="stat-grid" id="admin-stat-grid"></div>
        <div class="flex-between mt-lg">
          <a class="btn btn--primary btn-hover-scale" href="#/admin/approvals" data-route="/admin/approvals" id="admin-review-btn">Review Listings</a>
          <a class="btn btn--secondary btn-hover-scale" href="#/admin/users" data-route="/admin/users">Manage Users</a>
        </div>
      </div>
    </template>

    <template id="admin-approvals-template">
      <div class="container page-content">
        <div class="page-header">
          <h2>Listing Approvals</h2>
          <select class="form-select page-header__control" id="approval-status-filter">
            <option value="">All Status</option>
            <option value="pending">Pending</option>
            <option value="approved">Approved</option>
            <option value="rejected">Rejected</option>
          </select>
        </div>
        <div class="card">
          <div class="table-wrap">
            <table class="table">
              <thead><tr><th>Flat</th><th>Owner</th><th>Submitted</th><th>Status</th><th>Actions</th></tr></thead>
              <tbody id="approvals-tbody"></tbody>
            </table>
          </div>
        </div>
      </div>
    </template>

    <template id="admin-users-template">
      <div class="container page-content">
        <div class="page-header"><h2>User Management</h2></div>
        <div class="card">
          <div class="filter-bar filter-bar--inline">
            <input class="form-input" id="user-search-input" placeholder="Search by name or email…" />
            <select class="form-select" id="user-role-filter">
              <option value="">All Roles</option>
              <option value="tenant">Tenant</option>
              <option value="owner">Owner</option>
              <option value="admin">Admin</option>
            </select>
            <select class="form-select" id="user-status-filter">
              <option value="">All Statuses</option>
              <option value="active">Active</option>
              <option value="suspended">Suspended</option>
            </select>
          </div>
          <div class="table-wrap">
            <table class="table">
              <thead><tr><th>User</th><th>Role</th><th>Status</th><th>Joined</th><th>Actions</th></tr></thead>
              <tbody id="users-tbody"></tbody>
            </table>
          </div>
        </div>
      </div>
    </template>

    <!-- FlatFinder modules — load order matters -->
    <script src="ff-utils.js?v=20260424" defer></script>
    <script src="ff-core.js?v=20260424" defer></script>
    <script src="ff-auth.js?v=20260424" defer></script>
    <script src="ff-tenant.js?v=20260424" defer></script>
    <script src="ff-owner.js?v=20260424" defer></script>
    <script src="ff-admin.js?v=20260424" defer></script>
    <script src="app.js?v=20260424" defer></script>
  </body>
</html>
