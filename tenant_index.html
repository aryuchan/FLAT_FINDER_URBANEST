<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlatFinder | Tenant Portal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="app-root" class="page-content"></div>
    <div id="app-toast"></div>

    <!-- Fixes: Missing tmpl-auth bug -->
    <template id="tmpl-auth">
        <div class="card auth-card" style="max-width: 420px; margin: 100px auto">
            <h1 class="mt-sm" id="auth-title">Welcome</h1>
            <p class="text-muted" id="auth-sub">Sign in to continue</p>
            <form id="auth-form" class="mt-lg">
                <div class="field" style="text-align: left; margin-bottom: 1rem">
                    <label class="label">Email Address</label>
                    <input class="form-input" type="email" name="email" required style="width:100%; padding:0.8rem; border-radius:8px; border:1px solid var(--border)">
                </div>
                <div class="field" style="text-align: left; margin-bottom: 2rem">
                    <label class="label">Password</label>
                    <input class="form-input" type="password" name="password" required style="width:100%; padding:0.8rem; border-radius:8px; border:1px solid var(--border)">
                </div>
                <button type="submit" class="btn btn--primary btn--full">Continue</button>
            </form>
            <p class="mt-sm">New here? <a href="#/signup" class="text-primary">Create account</a></p>
        </div>
    </template>

    <script src="ff-core.js"></script>
    <script src="ff-auth.js"></script>
</body>
</html>
