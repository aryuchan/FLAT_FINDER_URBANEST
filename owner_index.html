<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlatFinder | Owner Portal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app-root"></div>
    <div id="app-toast"></div>
    <!-- tmpl-auth added as per mandate -->
    <template id="tmpl-auth">
        <div class="card auth-card" style="max-width: 420px; margin: 100px auto; text-align: center">
            <h1 id="auth-title">Owner Dashboard</h1>
            <form id="auth-form" class="mt-lg">
                <input class="form-input" type="email" name="email" placeholder="Email" required style="width:100%; margin-bottom: 1rem">
                <input class="form-input" type="password" name="password" placeholder="Password" required style="width:100%; margin-bottom: 2rem">
                <button type="submit" class="btn btn--primary btn--full">Login to Manage</button>
            </form>
        </div>
    </template>
    <script src="ff-core.js"></script>
    <script src="ff-auth.js"></script>
</body>
</html>
