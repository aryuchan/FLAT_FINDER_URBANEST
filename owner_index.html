<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Urbanest | Owner Suite</title>
    <link rel="stylesheet" href="style.css">
    <!-- FIX [18]: Added web app manifest link -->
    <link rel="manifest" href="/manifest.json">
</head>
<body>
    <nav id="app-nav"></nav><main id="app-root"></main><div id="app-toast"></div>
    <template id="tmpl-auth">
        <div class="card auth-card" style="max-width: 440px; margin: 80px auto; text-align: center">
            <h1>{{title}}</h1><p class="text-muted">{{sub}}</p>
            <form id="auth-form" class="mt-lg">
                <input class="input mt-sm" type="email" name="email" placeholder="Email" required style="width:100%">
                <input class="input mt-sm" type="password" name="password" placeholder="Password" required style="width:100%">
                <button type="submit" class="btn btn--primary btn--full mt-lg">Login to Suite</button>
            </form>
            <p class="mt-sm" style="font-size: 0.9rem">New Owner? <a href="#/signup" style="color: var(--primary); text-decoration: none; font-weight: bold;">Sign Up</a></p>
        </div>
    </template>
    <template id="tmpl-signup">
        <div class="card auth-card" style="max-width: 440px; margin: 80px auto; text-align: center">
            <h1>Owner Registration</h1><p class="text-muted">Start listing your properties</p>
            <form id="signup-form" class="mt-lg">
                <input class="input mt-sm" type="text" name="name" placeholder="Full Name" required style="width:100%">
                <input class="input mt-sm" type="email" name="email" placeholder="Email" required style="width:100%">
                <input class="input mt-sm" type="password" name="password" placeholder="Password (min 8 chars)" required style="width:100%">
                <input type="hidden" name="role" value="owner">
                <button type="submit" class="btn btn--primary btn--full mt-lg">Create Account</button>
            </form>
            <p class="mt-sm" style="font-size: 0.9rem">Already registered? <a href="#/login" style="color: var(--primary); text-decoration: none; font-weight: bold;">Login</a></p>
        </div>
    </template>
    <script src="ff-core.js"></script><script src="ff-auth.js"></script><script src="ff-owner.js"></script><script src="app.js"></script>
    <!-- FIX [6]: Added service worker registration -->
    <script>if('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');</script>
</body>
</html>
