<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Urbanest | Owner Suite</title>
    <meta
      name="description"
      content="List properties, manage bookings, and grow your portfolio."
    />
    <link rel="stylesheet" href="style.css" />
    <link rel="manifest" href="manifest.json" />
    <style>
      html {
        visibility: hidden;
      }
      html.ready {
        visibility: visible;
      }
    </style>
    <script>
      (function () {
        var t = localStorage.getItem("ff_theme") || "light";
        document.documentElement.setAttribute("data-theme", t);
        document.documentElement.classList.add("ready");
      })();
    </script>
  </head>
  <body>
    <nav class="nav" id="app-nav"></nav>
    <main id="app-root" class="page-content"></main>
    <div id="app-toast"></div>
    <div id="app-modal"></div>

    <!-- ── AUTH TEMPLATES ─────────────────────────────────────── -->
    <template id="tmpl-auth">
      <div class="container" style="max-width: 450px; padding-top: 10vh">
        <div class="auth-card" style="border-top: 3px solid var(--primary)">
          <div class="auth-logo">🔑</div>
          <h1 class="auth-title">{{title}}</h1>
          <p class="auth-sub">{{sub}}</p>
          <form id="auth-form" class="auth-form" novalidate>
            <div class="field">
              <label class="label" for="auth-email">Owner Email</label>
              <input
                class="input"
                type="email"
                id="auth-email"
                name="email"
                placeholder="owner@example.com"
                required
                autocomplete="email"
              />
            </div>
            <div class="field mt-sm">
              <label class="label" for="auth-password">Password</label>
              <div style="position: relative">
                <input
                  class="input"
                  type="password"
                  id="auth-password"
                  name="password"
                  required
                  placeholder="Your password"
                  style="padding-right: 45px"
                  autocomplete="current-password"
                />
                <button
                  type="button"
                  class="toggle-password"
                  aria-label="Toggle password"
                >
                  👁️
                </button>
              </div>
            </div>
            <button type="submit" class="btn btn--primary btn--full mt-lg">
              Login to Suite →
            </button>
          </form>
          <p class="auth-switch">
            List your property today.
            <a href="#/signup" style="color: var(--primary); font-weight: 700"
              >Get Started</a
            >
          </p>
        </div>
      </div>
    </template>

    <template id="tmpl-signup">
      <div class="container" style="max-width: 450px; padding-top: 10vh">
        <div class="auth-card" style="border-top: 3px solid var(--primary)">
          <div class="auth-logo">🏢</div>
          <h1 class="auth-title">Become an Owner</h1>
          <p class="auth-sub">Join the network of premium urban residences.</p>
          <form id="signup-form" class="auth-form" novalidate>
            <div class="field">
              <label class="label" for="signup-name">Full Name</label>
              <input
                class="input"
                name="name"
                id="signup-name"
                placeholder="Your full name"
                required
                autocomplete="name"
              />
            </div>
            <div class="field mt-sm">
              <label class="label" for="signup-email">Email</label>
              <input
                class="input"
                type="email"
                name="email"
                id="signup-email"
                placeholder="owner@example.com"
                required
                autocomplete="email"
              />
            </div>
            <div class="field mt-sm">
              <label class="label" for="signup-password">Password</label>
              <div style="position: relative">
                <input
                  class="input"
                  type="password"
                  name="password"
                  id="signup-password"
                  placeholder="Min 8 characters"
                  required
                  style="padding-right: 45px"
                  autocomplete="new-password"
                />
                <button
                  type="button"
                  class="toggle-password"
                  aria-label="Toggle password"
                >
                  👁️
                </button>
              </div>
            </div>
            <input type="hidden" name="role" value="owner" />
            <button type="submit" class="btn btn--primary btn--full mt-lg">
              Register Suite →
            </button>
          </form>
          <p class="auth-switch">
            Already registered?
            <a href="#/login" style="color: var(--primary); font-weight: 700"
              >Sign In</a
            >
          </p>
        </div>
      </div>
    </template>

    <script src="ff-core.js"></script>
    <script src="ff-auth.js"></script>
    <script src="ff-owner.js"></script>
    <script src="app.js"></script>
    <script>
      if ("serviceWorker" in navigator)
        navigator.serviceWorker.register("/sw.js");
    </script>
  </body>
</html>
