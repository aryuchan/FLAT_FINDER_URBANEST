services:
  - type: web
    name: urbanest-api
    env: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
      - key: FRONTEND_URL
        value: https://urbanest.onrender.com

  - type: static
    name: urbanest-web
    env: static
    plan: free
    buildCommand: echo "Building Urbanest Static"
    staticPublishPath: .
    routes:
      - type: rewrite
        source: /tenant/*
        destination: /tenant_index.html
      - type: rewrite
        source: /owner/*
        destination: /owner_index.html
      - type: rewrite
        source: /admin/*
        destination: /admin_index.html
      - type: rewrite
        source: /tenant
        destination: /tenant_index.html
      - type: rewrite
        source: /owner
        destination: /owner_index.html
      - type: rewrite
        source: /admin
        destination: /admin_index.html
